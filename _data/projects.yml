- title: ML Algorithms
  url: https://github.com/turnerluke/ML-algos
  relevance: 82
  badges:
    - label: View on GitHub
      img: "https://img.shields.io/badge/GitHub-View_on_GitHub-blue?logo=GitHub&style=for-the-badge"
      url: https://github.com/turnerluke/ML-algos
  body: |
    A collection of self-made machine learning algorithms. Algorithms are created with the intent of better understanding the processes behind each machine learning algorithm, as well as to communicate technical data science information.

    I have constructed the following algorithms:

    - K-Nearest Neighbors Classification
    - K-Nearest Neighbors Regression
    - K-Means Clustering
    - Multi-Layer Perceptron Classifier Neural Network
    - Multi-Layer Perceptron Regressor Neural Network
    - Gradient Descent Least-Squares Optimization with Regularization

- title: Computational Presentations
  url: https://github.com/turnerluke/computational-presentations
  relevance: 75
  badges:
    - label: View on GitHub
      img: "https://img.shields.io/badge/GitHub-View_on_GitHub-blue?logo=GitHub&style=for-the-badge"
      url: https://github.com/turnerluke/computational-presentations
  body: |
    A repository of my presentations from spring 2021 teaching computational coursework to chemical engineering undergraduate students. The course topics were set by the university, however these presentations and the examples with their code were made entirely from scratch.

    Coursework covered a variety of numerical methods and data operations, including but not limited to:

    - Coding fundamentals
    - Data visualizations
    - Data operations
    - Interpolation
    - Solving nonlinear systems of equations
    - Numerical integration
    - Nonlinear parameter estimation (least squares optimization)
    - Numerical solutions to differential equations
  image: /images/thumbnail_teaching.webp
  image_alt: Computational presentations for teaching chemical engineering coursework

