- title: Digit Recognition Web App
  url: https://github.com/turnerluke/digit_recog
  relevance: 92
  badges:
    - label: View Web App
      img: "https://img.shields.io/static/v1?label=streamlit&message=View%20Web%20App&color=bd4043&style=for-the-badge&logo=streamlit"
      url: https://digit-recog.streamlit.app/
    - label: View on GitHub
      img: "https://img.shields.io/badge/GitHub-View_on_GitHub-blue?logo=GitHub&style=for-the-badge"
      url: https://github.com/turnerluke/digit_recog
    - label: Model Training on Colab
      img: "https://img.shields.io/static/v1?label=Colab&message=Model%20Training&color=orange&style=for-the-badge&logo=Google%20Colab"
      url: https://colab.research.google.com/github/turnerluke/digit_recog/blob/main/models/LeNet_5_train.ipynb
  body: |
    A web app, deployed on streamlit, takes the user's input as a digit drawing on a canvas and outputs a prediction. This app is my over-engineered take on the "Hello World" of neural networks, digit prediction from the MNIST dataset, which takes the project all the way to a deployed model on a polished website. This web app went through many iterations, starting as a Flask app on Heroku, to the same app on Render, landing now on a streamlit app. The previous implementation in Flask can be found in the GitHub repo.
  image: /images/web_app.webp
  image_alt: "Digit recognition web app: a canvas for drawing a digit with the model's prediction"

